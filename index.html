<!DOCTYPE html>
<html lang="zh-CN" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>一维量子隧穿效应动力学可视化</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.plot.ly/plotly-2.27.0.min.js"></script>
    <style>
        body { background-color: #0a0e17; color: #c9d1d9; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; overflow-x: hidden; }
        
        /* 图表容器默认高度（电脑端） */
        #plot-container {
            width: 100%; height: 550px;
            border: 1px solid #00f3ff;
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.2);
            border-radius: 12px; overflow: hidden; background-color: #0d1117;
        }
        
        .card { background-color: #121826; border: 1px solid #1f2937; border-radius: 10px; }
        .card-header.bg-primary { background-color: #0d1117 !important; border-bottom: 1px solid #00f3ff; color: #00f3ff !important; font-weight: bold;}
        .card-header.bg-light { background-color: #0d1117 !important; border-bottom: 1px solid #374151; color: #e5e7eb !important; }
        .control-label { display: flex; justify-content: space-between; font-weight: bold; color: #a5b4fc; margin-bottom: 2px; font-size: 0.9rem;}
        
        /* 放大滑块触控点，适配手机粗手指 */
        input[type=range]::-webkit-slider-thumb { 
            background: #00f3ff; box-shadow: 0 0 10px #00f3ff; 
            width: 18px; height: 18px; 
        }
        .form-check-input:checked { background-color: #facc15; border-color: #facc15; box-shadow: 0 0 10px rgba(250, 204, 21, 0.6); }
        
        .result-box { font-size: 1.6rem; font-weight: bold; color: #00f3ff; text-shadow: 0 0 10px rgba(0, 243, 255, 0.5); }
        .text-success { color: #39ff14 !important; text-shadow: 0 0 10px rgba(57, 255, 20, 0.5); }
        .text-danger { color: #ff007f !important; text-shadow: 0 0 10px rgba(255, 0, 127, 0.5); }

        #btn-animate {
            border: 2px solid #39ff14; color: #39ff14; background: transparent;
            transition: all 0.2s ease; font-weight: bold;
            text-shadow: 0 0 5px rgba(57, 255, 20, 0.5);
            box-shadow: 0 0 5px rgba(57, 255, 20, 0.2);
        }
        #btn-animate:hover { background-color: rgba(57, 255, 20, 0.1); box-shadow: 0 0 15px rgba(57, 255, 20, 0.4); }
        #btn-animate.active { background-color: #39ff14; color: #0a0e17; text-shadow: none; box-shadow: 0 0 20px #39ff14; }
        
        .highlight-E { color: #ff007f; font-weight: bold; }
        .highlight-V0 { color: #00f3ff; font-weight: bold; }
        .highlight-Prob { color: #facc15; font-weight: bold; }

        /* ======== 核心手机端适配逻辑 ======== */
        @media (max-width: 991px) {
            /* 1. 图表吸顶：滑动下方参数时，图表固定在屏幕上方 */
            .sticky-mobile {
                position: -webkit-sticky;
                position: sticky;
                top: 0;
                z-index: 1020;
                background-color: #0a0e17; /* 防止透明背景文字重叠 */
                padding-top: 10px;
                padding-bottom: 10px;
                margin-bottom: 10px !important;
                border-bottom: 1px solid #1f2937;
            }
            /* 2. 缩小图表高度，给下方滑块留出操作空间 */
            #plot-container {
                height: 320px;
                border-radius: 8px;
            }
            /* 3. 紧凑型排版：减小标题和卡片的间距 */
            header h1 { font-size: 1.3rem !important; }
            header p { font-size: 0.8rem !important; }
            .result-box { font-size: 1.3rem; }
            .container-fluid { padding-left: 10px; padding-right: 10px; }
            .card-body { padding: 12px; }
        }
    </style>
</head>
<body>

<div class="container-fluid px-4 py-3">
    <header class="pb-2 mb-3 border-bottom border-secondary d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center">
        <div class="mb-2 mb-md-0">
            <h1 class="h3 fw-bold mb-0" style="color: #e5e7eb;">量子隧穿效应<span style="color: #00f3ff; font-size: 0.8em; margin-left:10px;">动力学可视化</span></h1>
            <p class="text-muted mb-0 mt-1" style="font-size:0.9rem;">调节下方参数，观察波函数随时间的震荡与隧穿概率。</p>
        </div>
        <div class="alert alert-info py-1 px-2 mb-0" style="background-color: rgba(56, 189, 248, 0.1); border: 1px solid rgba(56, 189, 248, 0.3); color: #38bdf8; font-size: 0.8rem; max-width: 100%;">
            <strong>提示：</strong> 开启动画后，黄线(概率)静止，绿线(波函数)震荡。
        </div>
    </header>

    <div class="row align-items-start">
        <div class="col-xl-8 col-lg-7 mb-3 sticky-mobile">
            <div id="plot-container"></div>
        </div>

        <div class="col-xl-4 col-lg-5">
            <div class="card mb-3 shadow">
                <div class="card-header bg-primary">
                    <h6 class="my-0">可视化控制面板</h6>
                </div>
                <div class="card-body d-flex flex-wrap justify-content-between align-items-center py-2 gap-2">
                    <button id="btn-animate" class="btn btn-sm px-3 flex-grow-1">
                        <span class="spinner-grow spinner-grow-sm d-none" role="status" aria-hidden="true"></span>
                        开启量子动画
                    </button>
                    <div class="form-check form-switch mb-0 ms-2">
                        <input class="form-check-input" type="checkbox" role="switch" id="toggle-prob" checked>
                        <label class="form-check-label text-warning fw-bold" for="toggle-prob" style="font-size:0.85rem; text-shadow: 0 0 5px rgba(250, 204, 21, 0.3);">
                            显示 |ψ|²
                        </label>
                    </div>
                </div>
            </div>

            <div class="card mb-3 shadow">
                <div class="card-body text-center py-2">
                    <div class="row">
                        <div class="col-6 border-end border-secondary">
                            <h6 style="color: #8b949e; font-size:0.8rem; margin-bottom: 2px;">透射率 (穿透)</h6>
                            <div class="result-box" id="val-T">0.00%</div>
                        </div>
                        <div class="col-6">
                            <h6 style="color: #8b949e; font-size:0.8rem; margin-bottom: 2px;">反射率 (弹回)</h6>
                            <div class="result-box text-danger" id="val-R">100.00%</div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card shadow mb-3">
                <div class="card-header bg-light">
                    <h6 class="my-0 text-white-50">物理参数调节 (汉密尔顿量)</h6>
                </div>
                <div class="card-body py-3">
                    <div class="mb-3">
                        <div class="control-label">
                            <label for="slider-E">粒子能量 (E)</label>
                            <span id="display-E">5.0 eV</span>
                        </div>
                        <input type="range" class="form-range" id="slider-E" min="0.1" max="25" step="0.1" value="10">
                    </div>
                    <div class="mb-3">
                        <div class="control-label">
                            <label for="slider-V0">势垒高度 (V<sub>0</sub>)</label>
                            <span id="display-V0">10.0 eV</span>
                        </div>
                        <input type="range" class="form-range" id="slider-V0" min="1" max="25" step="0.1" value="20">
                    </div>
                    <div class="mb-3">
                        <div class="control-label">
                            <label for="slider-a">势垒宽度 (a)</label>
                            <span id="display-a">1.0 nm</span>
                        </div>
                        <input type="range" class="form-range" id="slider-a" min="0.01" max="1" step="0.01" value="0.5">
                    </div>
                    <div class="mb-1">
                        <div class="control-label">
                            <label for="slider-m">粒子质量 (m)</label>
                            <span id="display-m">1 m<sub>e</sub></span>
                        </div>
                        <input type="range" class="form-range" id="slider-m" min="0.1" max="5" step="0.1" value="1">
                    </div>
                </div>
            </div>

            <div class="card shadow mb-4">
                <div class="card-header bg-light">
                    <h6 class="my-0 text-white-50">📖 探索指南</h6>
                </div>
                <div class="card-body" style="color: #8b949e; line-height: 1.6; font-size: 0.85rem;">
                    <p class="mb-2"><strong>经典物理：</strong>能量 <span class="highlight-E">E</span> 小于高度 <span class="highlight-V0">V<sub>0</sub></span> 的粒子会被 100% 弹回。</p>
                    <p class="mb-3"><strong>量子隧穿：</strong>微观粒子的波函数在势垒内呈指数衰减。只要势垒够薄，就有概率“穿墙”过去。</p>
                </div>
            </div>
            
        </div>
    </div>
</div>

<script>
    const sliders = { E: 'slider-E', V0: 'slider-V0', a: 'slider-a', m: 'slider-m' };
    const displays = { E: 'display-E', V0: 'display-V0', a: 'display-a', m: 'display-m' };
    Object.keys(sliders).forEach(k => { 
        sliders[k] = document.getElementById(sliders[k]); 
        displays[k] = document.getElementById(displays[k]); 
    });
    
    const toggleProb = document.getElementById('toggle-prob');
    const btnAnimate = document.getElementById('btn-animate');
    const valT = document.getElementById('val-T');
    const valR = document.getElementById('val-R');

    const K_phys = 5.124; 
    let animationId = null;
    let isAnimating = false;
    let time = 0;
    const timeSpeed = 0.01; 
    
    let cachedWave = {
        xValues: [], rePart: [], imPart: [], probDensity: [], baseLayout: {}
    };

    const Complex = {
        add: (a, b) => ({ re: a.re + b.re, im: a.im + b.im }),
        sub: (a, b) => ({ re: a.re - b.re, im: a.im - b.im }),
        mul: (a, b) => ({ re: a.re * b.re - a.im * b.im, im: a.re * b.im + a.im * b.re }),
        div: (a, b) => {
            const mag = b.re * b.re + b.im * b.im;
            return { re: (a.re * b.re + a.im * b.im) / mag, im: (a.im * b.re - a.re * b.im) / mag };
        },
        exp: (re, im) => {
            const e = Math.exp(re);
            return { re: e * Math.cos(im), im: e * Math.sin(im) };
        },
        scale: (c, s) => ({ re: c.re * s, im: c.im * s })
    };

    function recalculatePhysicsAndCache() {
        const E = parseFloat(sliders.E.value);
        const V0 = parseFloat(sliders.V0.value);
        const a = parseFloat(sliders.a.value);
        const m = parseFloat(sliders.m.value);

        let T;
        if (Math.abs(E - V0) < 0.001) {
            const term = (m * V0 * Math.pow(a * K_phys, 2)) / 4;
            T = 1 / (1 + term);
        } else if (E < V0) {
            const kappa = K_phys * Math.sqrt(m * (V0 - E));
            const sinhTerm = Math.sinh(kappa * a);
            const term = (Math.pow(V0, 2) * Math.pow(sinhTerm, 2)) / (4 * E * (V0 - E));
            T = 1 / (1 + term);
        } else {
            const k2 = K_phys * Math.sqrt(m * (E - V0));
            const sinTerm = Math.sin(k2 * a);
            const term = (Math.pow(V0, 2) * Math.pow(sinTerm, 2)) / (4 * E * (E - V0));
            T = 1 / (1 + term);
        }
        const R = 1 - T;
        
        valT.innerText = (T * 100).toFixed(4) + '%';
        valR.innerText = (R * 100).toFixed(4) + '%';
        valT.className = T < 0.0001 ? "result-box" : "result-box text-success";
        if(T < 0.0001) valT.style.color = "#6b7280"; else valT.style.color = "";

        const xMin = -2, xMax = 5, step = 0.01;
        cachedWave.xValues = []; cachedWave.rePart = []; cachedWave.imPart = []; cachedWave.probDensity = [];
        
        let calcE = Math.abs(E - V0) < 0.001 ? V0 + 0.001 : E;
        const k1 = K_phys * Math.sqrt(m * calcE);
        let r, t, A, B, C_c, D_c, kappa, k2;

        if (calcE < V0) {
            kappa = K_phys * Math.sqrt(m * (V0 - calcE));
            const denom = { re: Math.cosh(kappa * a), im: ((k1*k1 - kappa*kappa) / (2 * k1 * kappa)) * Math.sinh(kappa * a) };
            t = Complex.div(Complex.exp(0, -k1 * a), denom);
            r = Complex.div({ re: 0, im: -((k1*k1 + kappa*kappa) / (2 * k1 * kappa)) * Math.sinh(kappa * a) }, denom);
            const t_phase = Complex.mul(t, Complex.exp(0, k1 * a));
            A = Complex.mul(t_phase, { re: 0.5 * Math.exp(-kappa * a), im: 0.5 * Math.exp(-kappa * a) * (k1 / kappa) });
            B = Complex.mul(t_phase, { re: 0.5 * Math.exp(kappa * a), im: -0.5 * Math.exp(kappa * a) * (k1 / kappa) });
        } else {
            k2 = K_phys * Math.sqrt(m * (calcE - V0));
            const denom = { re: Math.cos(k2 * a), im: -((k1*k1 + k2*k2) / (2 * k1 * k2)) * Math.sin(k2 * a) };
            t = Complex.div(Complex.exp(0, -k1 * a), denom);
            r = Complex.div({ re: 0, im: ((k1*k1 - k2*k2) / (2 * k1 * k2)) * Math.sin(k2 * a) }, denom);
            const t_phase = Complex.mul(t, Complex.exp(0, k1 * a));
            C_c = Complex.mul(t_phase, Complex.scale(Complex.exp(0, -k2 * a), 0.5 * (1 + k1 / k2)));
            D_c = Complex.mul(t_phase, Complex.scale(Complex.exp(0, k2 * a), 0.5 * (1 - k1 / k2)));
        }

        for (let x = xMin; x <= xMax; x += step) {
            cachedWave.xValues.push(x);
            let psi = { re: 0, im: 0 };
            if (x < 0) {
                psi = Complex.add(Complex.exp(0, k1 * x), Complex.mul(r, Complex.exp(0, -k1 * x)));
            } else if (x <= a) {
                if (calcE < V0) {
                    psi = Complex.add(Complex.scale(A, Math.exp(kappa * x)), Complex.scale(B, Math.exp(-kappa * x)));
                } else {
                    psi = Complex.add(Complex.mul(C_c, Complex.exp(0, k2 * x)), Complex.mul(D_c, Complex.exp(0, -k2 * x)));
                }
            } else {
                psi = Complex.mul(t, Complex.exp(0, k1 * x));
            }
            cachedWave.rePart.push(psi.re);
            cachedWave.imPart.push(psi.im);
            cachedWave.probDensity.push(psi.re * psi.re + psi.im * psi.im);
        }

        cachedWave.traceBarrier = {
            x: [xMin, 0, 0, a, a, xMax], y: [0, 0, V0, V0, 0, 0], 
            type: 'scatter', mode: 'lines', name: '势垒 (V₀)', 
            line: { color: '#00f3ff', width: 2.5 }, fill: 'tozeroy', fillcolor: 'rgba(0, 243, 255, 0.15)', hoverinfo: 'none'
        };

        cachedWave.traceEnergy = {
            x: [xMin, xMax], y: [E, E], type: 'scatter', mode: 'lines',
            name: '粒子能量 (E)', line: { color: '#ff007f', width: 2, dash: 'dash' }, hoverinfo: 'none'
        };

        // 动态判断屏幕宽度，决定图表的边距（手机端边距更小，节省空间）
        const isMobile = window.innerWidth <= 991;
        const marginSettings = isMobile ? { l: 45, r: 15, t: 25, b: 35 } : { l: 60, r: 30, t: 30, b: 50 };

        cachedWave.baseLayout = {
            paper_bgcolor: 'rgba(0,0,0,0)', plot_bgcolor: 'rgba(0,0,0,0)',
            xaxis: { title: '位置 x (nm)', range: [xMin, xMax], zeroline: false, gridcolor: 'rgba(255,255,255,0.03)', titlefont: { color: '#8b949e', size: isMobile?10:12 }, tickfont: { color: '#8b949e', size: isMobile?10:12 } },
            yaxis: { title: isMobile ? '能量/概率' : '能量 / 波幅 / 概率 (eV)', range: [-5, 25], zeroline: true, zerolinecolor: 'rgba(255,255,255,0.1)', gridcolor: 'rgba(255,255,255,0.03)', titlefont: { color: '#8b949e', size: isMobile?10:12 }, tickfont: { color: '#8b949e', size: isMobile?10:12 } },
            margin: marginSettings, showlegend: true, 
            legend: { x: 0.02, y: 0.98, font: { color: '#c9d1d9', size: isMobile?9:11 }, bgcolor: 'rgba(10, 14, 23, 0.8)', bordercolor: 'rgba(255,255,255,0.1)', borderwidth: 1 }, hovermode: 'closest'
        };

        renderAnimationFrame();
    }

    function renderAnimationFrame() {
        const E_param = parseFloat(sliders.E.value);
        const phase = -time; 

        const animatingRePart = [];
        const animatingProbDensity = [];
        
        for (let i = 0; i < cachedWave.xValues.length; i++) {
            const u = cachedWave.rePart[i];
            const v = cachedWave.imPart[i];
            
            const oscillatngRe = u * Math.cos(phase) - v * Math.sin(phase);
            animatingRePart.push(E_param + 2.5 * oscillatngRe); 
            animatingProbDensity.push(E_param + 0.5 + 1.0 * cachedWave.probDensity[i]);
        }

        const traceProb = {
            x: cachedWave.xValues, y: animatingProbDensity, type: 'scatter', mode: 'lines',
            name: '概率密度 |Ψ|²', line: { color: '#facc15', width: window.innerWidth<=991?2:3 }, hoverinfo: 'none',
            visible: toggleProb.checked
        };

        const traceWave = {
            x: cachedWave.xValues, y: animatingRePart, type: 'scatter', mode: 'lines',
            name: 'Re(Ψ(x,t))', line: { color: '#39ff14', width: window.innerWidth<=991?1.5:2.5 }, hoverinfo: 'none'
        };

        Plotly.react('plot-container', [
            cachedWave.traceBarrier, 
            cachedWave.traceEnergy, 
            traceProb, 
            traceWave
        ], cachedWave.baseLayout);
    }

    function animationLoop() {
        if (!isAnimating) return;
        
        const E_val = parseFloat(sliders.E.value);
        time += timeSpeed * (1 + E_val * 0.1); 
        
        renderAnimationFrame();
        animationId = requestAnimationFrame(animationLoop);
    }

    function handleParamChange() {
        Object.keys(displays).forEach(k => { 
            displays[k].innerHTML = sliders[k].value + (k==='m'?' m<sub>e</sub>':(k==='a'?' nm':' eV')); 
        });
        recalculatePhysicsAndCache();
    }

    Object.values(sliders).forEach(s => s.addEventListener('input', handleParamChange));
    toggleProb.addEventListener('change', renderAnimationFrame); 

    btnAnimate.addEventListener('click', () => {
        isAnimating = !isAnimating;
        
        if (isAnimating) {
            btnAnimate.classList.add('active');
            btnAnimate.innerHTML = '<span class="spinner-grow spinner-grow-sm" role="status"></span> 停止动画';
            animationLoop();
        } else {
            btnAnimate.classList.remove('active');
            btnAnimate.innerText = '开启量子动画';
            if (animationId) cancelAnimationFrame(animationId);
            time = 0; 
            renderAnimationFrame(); 
        }
    });

    // 监听窗口大小变化，自动调整 Plotly 图表尺寸
    window.addEventListener('resize', () => {
        Plotly.Plots.resize('plot-container');
        recalculatePhysicsAndCache(); // 重新计算以应用手机/电脑不同的边距
    });

    handleParamChange();
</script>
</body>
</html>
